<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fond bleu navy avec coins arrondis -->
  <rect width="100" height="100" rx="18" fill="#0B1566"/>

  <!-- Cercle décoratif navy foncé — coin haut-gauche -->
  <circle cx="12" cy="12" r="22" fill="#060D45" opacity="0.7"/>

  <!-- Cercle accent jaune-vert — coin bas-droite -->
  <circle cx="88" cy="88" r="34" fill="#C8E000"/>

  <!-- Lettre E bold blanche -->
  <text x="14" y="62"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#ffffff"
    letter-spacing="-2">E+</text>
</svg>
